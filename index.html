<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>弓道フォーム分析</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;background:#000;overflow:hidden;
            font-family:system-ui,-apple-system,sans-serif;color:#fff}
        #app{position:relative;width:100vw;height:100vh}

        /* ── メディア要素 ───────────────────── */
        #cam-video,#file-video{
            position:absolute;inset:0;width:100%;height:100%;
            object-fit:contain;background:#000;display:none
        }
        #cam-video.show,#file-video.show{display:block}
        #bg-canvas{
            position:absolute;inset:0;width:100%;height:100%;display:none
        }
        #bg-canvas.show{display:block}
        #overlay{
            position:absolute;inset:0;width:100%;height:100%;pointer-events:none
        }

        /* ── ヘッダー ───────────────────────── */
        #header{
            position:absolute;top:0;left:0;right:0;z-index:20;
            padding:12px 16px 0;
            background:linear-gradient(to bottom,rgba(0,0,0,.85) 80%,transparent)
        }
        #title-row{font-size:15px;font-weight:600;margin-bottom:10px}
        #tabs{display:flex;gap:6px;padding-bottom:12px}
        .tab{
            flex:1;padding:8px 0;border-radius:18px;
            background:rgba(255,255,255,.12);color:rgba(255,255,255,.65);
            border:1.5px solid rgba(255,255,255,.2);font-size:13px;cursor:pointer
        }
        .tab.on{
            background:rgba(255,255,255,.92);color:#000;
            border-color:transparent;font-weight:700
        }

        /* ── 角度バッジ ─────────────────────── */
        .badge{
            position:absolute;display:none;
            padding:4px 10px 5px;border-radius:7px;
            font-size:14px;font-weight:700;letter-spacing:.3px;
            background:rgba(0,0,0,.78);border:2px solid;white-space:nowrap;
            pointer-events:none;z-index:10
        }
        .c-cyan{color:#00e5ff;border-color:#00e5ff}
        .c-red {color:#ff5252;border-color:#ff5252}
        .c-grn {color:#69f0ae;border-color:#69f0ae}

        /* ── アップロードエリア ─────────────── */
        #upload-area{
            position:absolute;inset:0;display:none;
            flex-direction:column;align-items:center;justify-content:center;
            gap:16px;z-index:15;background:rgba(0,0,0,.55)
        }
        #upload-area.show{display:flex}
        .upload-box{
            border:2px dashed rgba(255,255,255,.35);border-radius:18px;
            padding:40px 36px;text-align:center;background:rgba(255,255,255,.07)
        }
        #upload-icon{font-size:52px;display:block;margin-bottom:14px}
        #upload-hint{color:#999;font-size:13px;margin-top:10px}
        .upload-btn{
            background:#00e5ff;color:#000;font-weight:700;
            border:none;padding:12px 30px;border-radius:24px;font-size:15px;cursor:pointer
        }
        .upload-btn:active{opacity:.8}

        /* ── シークバー (動画) ──────────────── */
        #seek-wrap{
            position:absolute;bottom:60px;left:16px;right:16px;z-index:20;display:none
        }
        #seek-wrap.show{display:block}
        #seekbar{width:100%;height:3px;accent-color:#00e5ff;cursor:pointer}
        #time-lbl{font-size:11px;color:rgba(255,255,255,.65);text-align:right;margin-top:3px}

        /* ── フッター ───────────────────────── */
        #footer{
            position:absolute;bottom:0;left:0;right:0;z-index:20;
            padding:10px 16px 20px;
            background:linear-gradient(to top,rgba(0,0,0,.6),transparent);
            display:flex;justify-content:center;gap:10px;flex-wrap:wrap
        }
        .btn{
            background:rgba(255,255,255,.18);color:#fff;
            border:1.5px solid rgba(255,255,255,.4);
            padding:9px 18px;border-radius:22px;font-size:13px;cursor:pointer
        }
        .btn:active{background:rgba(255,255,255,.4)}
        .btn.hi{background:#00e5ff;color:#000;border-color:transparent;font-weight:700}

        /* ── ヒント・ローディング ───────────── */
        #noperson{
            position:absolute;bottom:76px;left:0;right:0;
            text-align:center;color:rgba(255,255,255,.5);font-size:13px;
            display:none;pointer-events:none;z-index:10
        }
        #loading{
            position:absolute;inset:0;display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            background:rgba(0,0,0,.93);gap:20px;text-align:center;
            padding:36px;z-index:50
        }
        .spin{
            width:46px;height:46px;
            border:4px solid rgba(255,255,255,.15);
            border-top-color:#00e5ff;border-radius:50%;
            animation:rot .85s linear infinite
        }
        @keyframes rot{to{transform:rotate(360deg)}}
        #load-msg{font-size:15px;line-height:1.9;color:#bbb}
        #load-msg b{display:block;font-size:18px;color:#fff;margin-bottom:6px}
    </style>
</head>
<body>
<div id="app">
    <!-- メディア層 -->
    <video id="cam-video"  playsinline autoplay muted></video>
    <video id="file-video" playsinline loop></video>
    <canvas id="bg-canvas"></canvas>
    <canvas id="overlay"></canvas>

    <!-- 角度バッジ -->
    <div class="badge c-cyan" id="b-re">右肘 --°</div>
    <div class="badge c-cyan" id="b-le">左肘 --°</div>
    <div class="badge c-red"  id="b-sh">肩水平 --°</div>
    <div class="badge c-cyan" id="b-hi">腰水平 --°</div>
    <div class="badge c-grn"  id="b-ft">足水平 --°</div>

    <!-- ヘッダー -->
    <div id="header">
        <div id="title-row">🏹 弓道フォーム分析</div>
        <div id="tabs">
            <button class="tab on" data-mode="cam">📷 カメラ</button>
            <button class="tab"    data-mode="photo">🖼 写真</button>
            <button class="tab"    data-mode="video">🎬 動画</button>
        </div>
    </div>

    <!-- アップロードエリア -->
    <div id="upload-area">
        <div class="upload-box">
            <span id="upload-icon">🖼</span>
            <button class="upload-btn" id="upload-btn">ファイルを選択</button>
            <p id="upload-hint">写真を選択してください</p>
        </div>
        <input type="file" id="file-input" style="display:none">
    </div>

    <!-- シークバー -->
    <div id="seek-wrap">
        <input type="range" id="seekbar" min="0" max="100" value="0" step="0.1">
        <div id="time-lbl">0:00 / 0:00</div>
    </div>

    <div id="noperson">人物を画面に映してください</div>

    <!-- フッター -->
    <div id="footer">
        <div id="cam-ctrl" style="display:flex;gap:10px">
            <button class="btn" id="btn-flip">↔ 反転</button>
            <button class="btn" id="btn-switch">📷 前後</button>
        </div>
        <div id="vid-ctrl" style="display:none;gap:10px;flex-wrap:wrap;justify-content:center">
            <button class="btn" id="btn-play">▶ 再生</button>
            <button class="btn" id="btn-slow">🐢 0.5x</button>
            <button class="btn hi" id="btn-vid-open">動画を変更</button>
        </div>
        <div id="photo-ctrl" style="display:none;gap:10px">
            <button class="btn hi" id="btn-photo-open">🖼 写真を変更</button>
        </div>
    </div>

    <!-- ローディング -->
    <div id="loading">
        <div class="spin"></div>
        <div id="load-msg">
            <b>🏹 弓道フォーム分析</b>
            AIモデルを読み込んでいます…<br>
            <small>初回は20〜30秒かかります</small>
        </div>
    </div>
</div>

<script type="module">
import { PoseLandmarker, FilesetResolver }
    from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

// ── DOM ────────────────────────────────────────────────────
const camVideo  = document.getElementById('cam-video');
const fileVideo = document.getElementById('file-video');
const bgCanvas  = document.getElementById('bg-canvas');
const overlay   = document.getElementById('overlay');
const bgCtx     = bgCanvas.getContext('2d');
const ovCtx     = overlay.getContext('2d');
const loadMsg   = document.getElementById('load-msg');
const noperson  = document.getElementById('noperson');
const seekbar   = document.getElementById('seekbar');
const timeLbl   = document.getElementById('time-lbl');

// ── State ──────────────────────────────────────────────────
let landmarker;
let mode = 'cam';
let camRafId, vidRafId;
let flipped = false, facing = 'environment';
let photoImg = null;
let slowMode = false;

// ── Landmark indices ────────────────────────────────────────
const K = {LS:11,RS:12,LE:13,RE:14,LW:15,RW:16,LH:23,RH:24,LK:25,RK:26,LA:27,RA:28};

const BONES = [
    [K.LS,K.RS,'#4caf50'],
    [K.LS,K.LE,'#42a5f5'],[K.LE,K.LW,'#42a5f5'],
    [K.RS,K.RE,'#ffa726'],[K.RE,K.RW,'#ffa726'],
    [K.LS,K.LH,'#4caf50'],[K.RS,K.RH,'#4caf50'],[K.LH,K.RH,'#4caf50'],
    [K.LH,K.LK,'#4caf50'],[K.LK,K.LA,'#4caf50'],
    [K.RH,K.RK,'#4caf50'],[K.RK,K.RA,'#4caf50']
];

// ── 座標変換 ────────────────────────────────────────────────
function getT() {
    let vw, vh;
    if(mode==='cam'){vw=camVideo.videoWidth||1;vh=camVideo.videoHeight||1;}
    else if(mode==='photo'){vw=photoImg?.naturalWidth||1;vh=photoImg?.naturalHeight||1;}
    else{vw=fileVideo.videoWidth||1;vh=fileVideo.videoHeight||1;}
    const cw=overlay.width,ch=overlay.height,s=Math.min(cw/vw,ch/vh);
    return{s,ox:(cw-vw*s)/2,oy:(ch-vh*s)/2,vw,vh};
}
const toX=(lm,t)=>lm.x*t.vw*t.s+t.ox;
const toY=(lm,t)=>lm.y*t.vh*t.s+t.oy;

// ── 角度計算 ────────────────────────────────────────────────
function angle3(a,b,c){
    const[ax,ay]=[a.x-b.x,a.y-b.y],[cx,cy]=[c.x-b.x,c.y-b.y];
    const v=(ax*cx+ay*cy)/(Math.hypot(ax,ay)*Math.hypot(cx,cy)||1);
    return Math.round(Math.acos(Math.max(-1,Math.min(1,v)))*180/Math.PI);
}
const tiltDeg=(a,b)=>Math.round(Math.atan2(b.y-a.y,b.x-a.x)*1800/Math.PI)/10;
const midLm=(a,b)=>({x:(a.x+b.x)/2,y:(a.y+b.y)/2});
const isVis=(ls,i)=>(ls[i]?.visibility??0)>=0.45;

// ── 骨格描画 ────────────────────────────────────────────────
function drawSkeleton(ls){
    const t=getT();
    ovCtx.save();ovCtx.setLineDash([12,8]);
    ovCtx.strokeStyle='rgba(0,255,60,0.28)';ovCtx.lineWidth=1.5;
    ovCtx.beginPath();ovCtx.moveTo(t.ox+t.vw*t.s/2,t.oy);
    ovCtx.lineTo(t.ox+t.vw*t.s/2,t.oy+t.vh*t.s);
    ovCtx.stroke();ovCtx.restore();
    ovCtx.lineCap='round';
    for(const[ai,bi,col] of BONES){
        const a=ls[ai],b=ls[bi];
        if(!a||!b||a.visibility<.35||b.visibility<.35) continue;
        ovCtx.beginPath();ovCtx.strokeStyle=col;ovCtx.lineWidth=4;
        ovCtx.moveTo(toX(a,t),toY(a,t));ovCtx.lineTo(toX(b,t),toY(b,t));ovCtx.stroke();
    }
    for(const i of Object.values(K)){
        const lm=ls[i];if(!lm||lm.visibility<.35) continue;
        ovCtx.beginPath();
        ovCtx.fillStyle='#fff';ovCtx.strokeStyle='#333';ovCtx.lineWidth=1.5;
        ovCtx.arc(toX(lm,t),toY(lm,t),6,0,2*Math.PI);ovCtx.fill();ovCtx.stroke();
    }
}

// ── バッジ ──────────────────────────────────────────────────
function place(el,nlx,nly,dx,dy){
    const t=getT(),x=nlx*t.vw*t.s+t.ox+dx,y=nly*t.vh*t.s+t.oy+dy;
    el.style.left=Math.max(2,x)+'px';el.style.top=Math.max(2,y)+'px';el.style.display='block';
}
const hide=el=>el.style.display='none';
const hideAll=()=>document.querySelectorAll('.badge').forEach(hide);

function updateBadges(ls){
    const g=id=>document.getElementById(id);
    const re=g('b-re');
    if(isVis(ls,K.RS)&&isVis(ls,K.RE)&&isVis(ls,K.RW)){
        re.textContent=`右肘 ${angle3(ls[K.RS],ls[K.RE],ls[K.RW])}°`;
        place(re,ls[K.RE].x,ls[K.RE].y,-102,-5);
    }else hide(re);
    const le=g('b-le');
    if(isVis(ls,K.LS)&&isVis(ls,K.LE)&&isVis(ls,K.LW)){
        le.textContent=`左肘 ${angle3(ls[K.LS],ls[K.LE],ls[K.LW])}°`;
        place(le,ls[K.LE].x,ls[K.LE].y,16,-5);
    }else hide(le);
    const sh=g('b-sh');
    if(isVis(ls,K.LS)&&isVis(ls,K.RS)){
        const m=midLm(ls[K.LS],ls[K.RS]),d=tiltDeg(ls[K.RS],ls[K.LS]);
        sh.textContent=`肩水平 ${d>0?'+':''}${d}°`;place(sh,m.x,m.y,50,-36);
    }else hide(sh);
    const hi=g('b-hi');
    if(isVis(ls,K.LH)&&isVis(ls,K.RH)){
        const m=midLm(ls[K.LH],ls[K.RH]),d=tiltDeg(ls[K.RH],ls[K.LH]);
        hi.textContent=`腰水平 ${d>0?'+':''}${d}°`;place(hi,m.x,m.y,-118,5);
    }else hide(hi);
    const ft=g('b-ft');
    if((ls[K.LA]?.visibility??0)>.3&&(ls[K.RA]?.visibility??0)>.3){
        const m=midLm(ls[K.LA],ls[K.RA]),d=tiltDeg(ls[K.RA],ls[K.LA]);
        ft.textContent=`足水平 ${d>0?'+':''}${d}°`;place(ft,m.x,m.y,42,15);
    }else hide(ft);
}

function syncCanvas(){
    overlay.width=overlay.clientWidth;overlay.height=overlay.clientHeight;
    bgCanvas.width=bgCanvas.clientWidth;bgCanvas.height=bgCanvas.clientHeight;
}

function onResult(r){
    const ls=r.landmarks?.[0]??null;
    if(ls){noperson.style.display='none';drawSkeleton(ls);updateBadges(ls);}
    else{noperson.style.display='block';hideAll();}
}

// ── カメラループ ────────────────────────────────────────────
function camLoop(){
    camRafId=requestAnimationFrame(camLoop);
    if(camVideo.readyState<2) return;
    syncCanvas();ovCtx.clearRect(0,0,overlay.width,overlay.height);
    onResult(landmarker.detectForVideo(camVideo,performance.now()));
}

// ── 動画ループ ──────────────────────────────────────────────
function vidLoop(){
    vidRafId=requestAnimationFrame(vidLoop);
    if(fileVideo.readyState<2) return;
    syncCanvas();ovCtx.clearRect(0,0,overlay.width,overlay.height);
    try{onResult(landmarker.detectForVideo(fileVideo,performance.now()));}catch(e){}
    if(fileVideo.duration){
        seekbar.value=(fileVideo.currentTime/fileVideo.duration)*100;
        timeLbl.textContent=fmt(fileVideo.currentTime)+' / '+fmt(fileVideo.duration);
    }
    if(fileVideo.ended) document.getElementById('btn-play').textContent='▶ 再生';
}

// ── 写真解析 ────────────────────────────────────────────────
function analyzePhoto(){
    if(!photoImg) return;
    syncCanvas();
    const t=getT();
    bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
    bgCtx.drawImage(photoImg,t.ox,t.oy,t.vw*t.s,t.vh*t.s);
    ovCtx.clearRect(0,0,overlay.width,overlay.height);
    onResult(landmarker.detect(photoImg));
}

// ── カメラ起動 ──────────────────────────────────────────────
async function startCamera(f){
    camVideo.srcObject?.getTracks().forEach(t=>t.stop());
    const s=await navigator.mediaDevices.getUserMedia(
        {video:{facingMode:f,width:{ideal:1280},height:{ideal:720}},audio:false});
    camVideo.srcObject=s;return camVideo.play();
}

// ── モード切替 ──────────────────────────────────────────────
async function switchMode(newMode){
    if(mode===newMode) return;
    // クリーンアップ
    cancelAnimationFrame(camRafId);cancelAnimationFrame(vidRafId);
    camVideo.srcObject?.getTracks().forEach(t=>t.stop());
    fileVideo.pause();
    camVideo.classList.remove('show');fileVideo.classList.remove('show');bgCanvas.classList.remove('show');
    document.getElementById('seek-wrap').classList.remove('show');
    hideAll();ovCtx.clearRect(0,0,overlay.width,overlay.height);noperson.style.display='none';
    mode=newMode;
    // UI更新
    document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.mode===newMode));
    document.getElementById('cam-ctrl').style.display=newMode==='cam'?'flex':'none';
    document.getElementById('vid-ctrl').style.display=newMode==='video'?'flex':'none';
    document.getElementById('photo-ctrl').style.display=newMode==='photo'?'flex':'none';
    // 初期化
    if(newMode==='cam'){
        await landmarker.setOptions({runningMode:'VIDEO'});
        camVideo.classList.add('show');
        await startCamera(facing);camLoop();
    }else if(newMode==='photo'){
        await landmarker.setOptions({runningMode:'IMAGE'});
        bgCanvas.classList.add('show');
        if(photoImg) analyzePhoto();else showUpload();
    }else{
        await landmarker.setOptions({runningMode:'VIDEO'});
        if(fileVideo.src){
            fileVideo.classList.add('show');
            document.getElementById('seek-wrap').classList.add('show');
            vidLoop();
        }else showUpload();
    }
}

function showUpload(){
    const ua=document.getElementById('upload-area');
    const fi=document.getElementById('file-input');
    if(mode==='photo'){
        document.getElementById('upload-icon').textContent='🖼';
        document.getElementById('upload-hint').textContent='弓道の写真を選んでください';
        fi.accept='image/*';
    }else{
        document.getElementById('upload-icon').textContent='🎬';
        document.getElementById('upload-hint').textContent='弓道の動画を選んでください';
        fi.accept='video/*';
    }
    ua.classList.add('show');
}

// ── ファイル選択 ────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change',async e=>{
    const file=e.target.files?.[0];if(!file) return;
    document.getElementById('upload-area').classList.remove('show');
    const url=URL.createObjectURL(file);
    if(mode==='photo'){
        photoImg=new Image();
        photoImg.onload=()=>analyzePhoto();
        photoImg.src=url;
    }else{
        fileVideo.src=url;fileVideo.classList.add('show');
        document.getElementById('seek-wrap').classList.add('show');
        document.getElementById('btn-play').textContent='⏸ 停止';
        fileVideo.onloadedmetadata=()=>timeLbl.textContent='0:00 / '+fmt(fileVideo.duration);
        await fileVideo.load();fileVideo.play();
        vidLoop();
    }
    e.target.value='';
});

document.getElementById('upload-btn').addEventListener('click',()=>document.getElementById('file-input').click());
document.getElementById('btn-photo-open').addEventListener('click',()=>{
    document.getElementById('file-input').accept='image/*';document.getElementById('file-input').click();
});
document.getElementById('btn-vid-open').addEventListener('click',()=>{
    document.getElementById('file-input').accept='video/*';document.getElementById('file-input').click();
});

// ── 動画コントロール ────────────────────────────────────────
document.getElementById('btn-play').addEventListener('click',()=>{
    if(!fileVideo.src) return;
    const btn=document.getElementById('btn-play');
    if(fileVideo.paused||fileVideo.ended){fileVideo.play();btn.textContent='⏸ 停止';}
    else{fileVideo.pause();btn.textContent='▶ 再生';}
});
document.getElementById('btn-slow').addEventListener('click',()=>{
    slowMode=!slowMode;fileVideo.playbackRate=slowMode?.5:1;
    document.getElementById('btn-slow').textContent=slowMode?'🐢 0.5x ✓':'🐢 0.5x';
});
seekbar.addEventListener('input',()=>{
    if(fileVideo.duration) fileVideo.currentTime=(seekbar.value/100)*fileVideo.duration;
});

// ── カメラコントロール ──────────────────────────────────────
document.getElementById('btn-flip').addEventListener('click',()=>{
    flipped=!flipped;const tf=flipped?'scaleX(-1)':'none';
    camVideo.style.transform=overlay.style.transform=tf;
});
document.getElementById('btn-switch').addEventListener('click',async()=>{
    cancelAnimationFrame(camRafId);
    facing=facing==='environment'?'user':'environment';
    await startCamera(facing).catch(e=>alert(e.message));camLoop();
});

// ── タブ ────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>switchMode(t.dataset.mode)));

// ── ユーティリティ ──────────────────────────────────────────
const fmt=s=>`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;

// ── 初期化 ──────────────────────────────────────────────────
async function init(){
    try{
        const vision=await FilesetResolver.forVisionTasks(
            'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');
        landmarker=await PoseLandmarker.createFromOptions(vision,{
            baseOptions:{
                modelAssetPath:'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task',
                delegate:'GPU'
            },
            runningMode:'VIDEO',numPoses:1,
            minPoseDetectionConfidence:0.5,minTrackingConfidence:0.5
        });
        loadMsg.innerHTML='<b>カメラ起動中…</b>';
        camVideo.classList.add('show');
        await startCamera(facing);
        document.getElementById('loading').style.display='none';
        camLoop();
    }catch(e){
        document.querySelector('.spin').style.display='none';
        loadMsg.innerHTML=`<b style="color:#ff5252">⚠ エラー</b><br>${e.message}<br><small>HTTPS接続・カメラ許可が必要です</small>`;
    }
}
init();
</script>
</body>
</html>
