<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>弓道フォーム分析</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;background:#000;overflow:hidden;
            font-family:system-ui,-apple-system,sans-serif;color:#fff}
        #app{position:relative;width:100vw;height:100vh}

        #cam-video,#file-video{
            position:absolute;inset:0;width:100%;height:100%;
            object-fit:contain;background:#000;display:none
        }
        #cam-video.show,#file-video.show{display:block}
        #bg-canvas{position:absolute;inset:0;width:100%;height:100%;display:none}
        #bg-canvas.show{display:block}
        #overlay{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}

        /* ── ヘッダー ── */
        #header{
            position:absolute;top:0;left:0;right:0;z-index:20;
            padding:12px 16px 0;
            background:linear-gradient(to bottom,rgba(0,0,0,.85) 80%,transparent)
        }
        #title-row{font-size:15px;font-weight:600;margin-bottom:10px}
        #tabs{display:flex;gap:6px;padding-bottom:12px}
        .tab{
            flex:1;padding:8px 0;border-radius:18px;
            background:rgba(255,255,255,.12);color:rgba(255,255,255,.65);
            border:1.5px solid rgba(255,255,255,.2);font-size:13px;cursor:pointer
        }
        .tab.on{background:rgba(255,255,255,.92);color:#000;border-color:transparent;font-weight:700}

        /* ── 録画インジケーター ── */
        #rec-ind{
            position:absolute;top:82px;left:50%;transform:translateX(-50%);
            display:none;align-items:center;gap:8px;
            background:rgba(0,0,0,.78);padding:6px 16px;
            border-radius:20px;font-size:13px;z-index:25;white-space:nowrap
        }
        .rec-dot{
            width:10px;height:10px;background:#ff1744;
            border-radius:50%;animation:blink 1s ease-in-out infinite
        }
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

        /* ── 角度バッジ ── */
        .badge{
            position:absolute;display:none;
            padding:4px 10px 5px;border-radius:7px;
            font-size:14px;font-weight:700;letter-spacing:.3px;
            background:rgba(0,0,0,.78);border:2px solid;white-space:nowrap;
            pointer-events:none;z-index:10
        }
        .c-cyan{color:#00e5ff;border-color:#00e5ff}
        .c-red{color:#ff5252;border-color:#ff5252}
        .c-grn{color:#69f0ae;border-color:#69f0ae}

        /* ── 姿勢判定パネル ── */
        #judge-panel{
            position:absolute;top:166px;left:10px;z-index:15;
            background:rgba(0,0,0,.82);border:1.5px solid rgba(255,255,255,.25);
            border-radius:12px;padding:10px 13px;min-width:155px;
            display:none;pointer-events:none
        }
        #judge-panel.show{display:block}
        #judge-phase{
            font-size:13px;font-weight:700;color:#fff;
            margin-bottom:7px;padding-bottom:6px;
            border-bottom:1px solid rgba(255,255,255,.2)
        }
        .j-title{font-size:10px;color:rgba(255,255,255,.55);margin-bottom:3px}
        .j-row{
            display:flex;justify-content:space-between;align-items:center;
            font-size:12px;color:#fff;margin:3px 0;gap:8px
        }
        .j-name{color:rgba(255,255,255,.8)}
        .sc-good{color:#69f0ae;font-weight:700}
        .sc-ok  {color:#ffeb3b;font-weight:700}
        .sc-bad {color:#ff5252;font-weight:700}

        /* ── フェーズストリップ ── */
        #phase-strip{
            position:absolute;top:76px;left:0;right:0;height:88px;z-index:18;
            display:flex;align-items:center;overflow-x:auto;overflow-y:hidden;
            gap:5px;padding:5px 8px;
            background:rgba(0,0,0,.75);
            scrollbar-width:none;-webkit-overflow-scrolling:touch
        }
        #phase-strip::-webkit-scrollbar{display:none}
        #strip-reset{
            flex:0 0 auto;font-size:10px;color:rgba(255,255,255,.5);
            background:transparent;border:1px solid rgba(255,255,255,.2);
            border-radius:6px;padding:3px 6px;cursor:pointer;white-space:nowrap
        }
        .ph-slot{
            flex:0 0 68px;display:flex;flex-direction:column;align-items:center;
            gap:2px;cursor:pointer;border-radius:8px;
            border:1.5px solid rgba(255,255,255,.15);padding:4px 3px;
            background:rgba(255,255,255,.04);position:relative;
            transition:border-color .2s,background .2s
        }
        .ph-slot.ph-active{border-color:#00e5ff;background:rgba(0,229,255,.1)}
        .ph-slot.ph-done{border-color:rgba(255,255,255,.4)}
        .ph-thumb{
            width:62px;height:44px;border-radius:4px;
            background:rgba(255,255,255,.07);display:block;object-fit:cover
        }
        .ph-name{font-size:9px;color:rgba(255,255,255,.75);text-align:center;line-height:1.2}
        .ph-score{font-size:12px;font-weight:700;color:rgba(255,255,255,.4)}
        .ph-snap{
            position:absolute;top:2px;right:2px;
            background:rgba(0,0,0,.65);border:none;border-radius:4px;
            color:#fff;font-size:9px;padding:1px 4px;cursor:pointer;display:none
        }
        .ph-slot.ph-active .ph-snap{display:block}

        /* ── フェーズモーダル ── */
        #ph-modal{
            position:absolute;inset:0;z-index:60;display:none;
            flex-direction:column;align-items:center;justify-content:center;
            background:rgba(0,0,0,.9);padding:20px
        }
        #ph-modal.show{display:flex}
        #ph-modal-img{
            max-width:88vw;max-height:58vh;border-radius:12px;
            border:2px solid rgba(255,255,255,.3)
        }
        #ph-modal-info{
            color:#fff;text-align:center;padding:14px 0 8px;
            font-size:13px;line-height:1.8
        }
        #ph-modal-btns{display:flex;gap:10px;margin-top:4px}
        .ph-modal-btn{
            background:rgba(255,255,255,.18);color:#fff;
            border:1.5px solid rgba(255,255,255,.4);
            padding:9px 20px;border-radius:22px;font-size:13px;cursor:pointer
        }
        .ph-modal-btn.danger{color:#ff5252;border-color:#ff5252}

        /* ── アップロードエリア ── */
        #upload-area{
            position:absolute;inset:0;display:none;
            flex-direction:column;align-items:center;justify-content:center;
            gap:16px;z-index:15;background:rgba(0,0,0,.55)
        }
        #upload-area.show{display:flex}
        .upload-box{
            border:2px dashed rgba(255,255,255,.35);border-radius:18px;
            padding:40px 36px;text-align:center;background:rgba(255,255,255,.07)
        }
        #upload-icon{font-size:52px;display:block;margin-bottom:14px}
        #upload-hint{color:#999;font-size:13px;margin-top:10px}
        .upload-btn{
            background:#00e5ff;color:#000;font-weight:700;
            border:none;padding:12px 30px;border-radius:24px;font-size:15px;cursor:pointer
        }

        /* ── シークバー ── */
        #seek-wrap{
            position:absolute;bottom:148px;left:20px;right:20px;z-index:20;display:none;
            padding:14px 0
        }
        #seek-wrap.show{display:block}
        #seekbar{
            width:100%;height:8px;
            -webkit-appearance:none;appearance:none;
            background:rgba(255,255,255,.3);border-radius:4px;cursor:pointer;
            outline:none
        }
        #seekbar::-webkit-slider-thumb{
            -webkit-appearance:none;
            width:38px;height:38px;
            border-radius:50%;
            background:#00e5ff;
            cursor:pointer;
            box-shadow:0 2px 8px rgba(0,0,0,.6)
        }
        #seekbar::-moz-range-thumb{
            width:38px;height:38px;
            border-radius:50%;
            background:#00e5ff;
            cursor:pointer;border:none;
            box-shadow:0 2px 8px rgba(0,0,0,.6)
        }
        #time-lbl{font-size:12px;color:rgba(255,255,255,.75);text-align:center;margin-top:6px;font-weight:600}

        /* ── コマ操作バー（シークバーのすぐ下） ── */
        #frame-ctrl{
            position:absolute;bottom:95px;left:0;right:0;
            display:none;justify-content:center;gap:12px;z-index:20
        }
        #frame-ctrl.show{display:flex}

        /* ── コマ幅ボタン ── */
        .step-btn{
            padding:7px 12px;border-radius:16px;font-size:12px;cursor:pointer;
            background:rgba(255,255,255,.12);color:rgba(255,255,255,.65);
            border:1.5px solid rgba(255,255,255,.2)
        }
        .step-btn.on{background:rgba(0,229,255,.25);color:#00e5ff;border-color:#00e5ff;font-weight:700}

        /* ── フッター ── */
        #footer{
            position:absolute;bottom:0;left:0;right:0;z-index:20;
            padding:10px 16px 20px;
            background:linear-gradient(to top,rgba(0,0,0,.6),transparent);
            display:flex;justify-content:center;gap:10px;flex-wrap:wrap
        }
        .btn{
            background:rgba(255,255,255,.18);color:#fff;
            border:1.5px solid rgba(255,255,255,.4);
            padding:9px 18px;border-radius:22px;font-size:13px;cursor:pointer
        }
        .btn:active{background:rgba(255,255,255,.4)}
        .btn.hi{background:#00e5ff;color:#000;border-color:transparent;font-weight:700}
        /* 録画ボタン */
        #btn-rec{color:#ff5252;border-color:#ff5252}
        #btn-rec.rec-on{background:#ff1744;color:#fff;border-color:transparent;animation:pulse 1s ease-in-out infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}

        /* ── 自動判定トグル ── */
        #auto-toggle{
            display:flex;align-items:center;gap:7px;
            font-size:12px;color:rgba(255,255,255,.75);
            cursor:pointer;user-select:none
        }
        #auto-toggle-sw{
            width:36px;height:20px;border-radius:10px;
            background:rgba(255,255,255,.2);position:relative;
            transition:background .2s;flex-shrink:0
        }
        #auto-toggle-sw::after{
            content:'';position:absolute;top:3px;left:3px;
            width:14px;height:14px;border-radius:50%;background:#fff;
            transition:transform .2s
        }
        #auto-toggle.on #auto-toggle-sw{background:#00e5ff}
        #auto-toggle.on #auto-toggle-sw::after{transform:translateX(16px)}

        /* 手動モード：スロットタップで記録できることを示す */
        body.manual-mode .ph-slot{
            border-color:rgba(255,200,0,.3);
            cursor:pointer
        }
        body.manual-mode .ph-slot:active{
            background:rgba(255,200,0,.15)
        }
        body.manual-mode .ph-snap{display:none!important}

        /* 見直しモード：記録済みスロットをオレンジ枠で強調 */
        body.review-mode .ph-slot.ph-done{
            border-color:#ff9800;background:rgba(255,152,0,.12)
        }
        body.review-mode .ph-slot.ph-done:active{
            background:rgba(255,152,0,.28)
        }

        /* ── 見直しモードトグル ── */
        #review-toggle{
            display:none;align-items:center;gap:7px;
            font-size:12px;color:rgba(255,255,255,.75);
            cursor:pointer;user-select:none
        }
        #review-toggle.visible{display:flex}
        #review-toggle-sw{
            width:36px;height:20px;border-radius:10px;
            background:rgba(255,255,255,.2);position:relative;
            transition:background .2s;flex-shrink:0
        }
        #review-toggle-sw::after{
            content:'';position:absolute;top:3px;left:3px;
            width:14px;height:14px;border-radius:50%;background:#fff;
            transition:transform .2s
        }
        #review-toggle.on #review-toggle-sw{background:#ff9800}
        #review-toggle.on #review-toggle-sw::after{transform:translateX(16px)}

        /* ── ヒント ── */
        #noperson{
            position:absolute;bottom:76px;left:0;right:0;
            text-align:center;color:rgba(255,255,255,.5);font-size:13px;
            display:none;pointer-events:none;z-index:10
        }

        /* ── ローディング ── */
        #loading{
            position:absolute;inset:0;display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            background:rgba(0,0,0,.93);gap:20px;text-align:center;padding:36px;z-index:50
        }
        .spin{
            width:46px;height:46px;
            border:4px solid rgba(255,255,255,.15);
            border-top-color:#00e5ff;border-radius:50%;
            animation:rot .85s linear infinite
        }
        @keyframes rot{to{transform:rotate(360deg)}}
        #load-msg{font-size:15px;line-height:1.9;color:#bbb}
        #load-msg b{display:block;font-size:18px;color:#fff;margin-bottom:6px}
    </style>
</head>
<body>
<div id="app">
    <video id="cam-video"  playsinline autoplay muted></video>
    <video id="file-video" playsinline loop></video>
    <canvas id="bg-canvas"></canvas>
    <canvas id="overlay"></canvas>

    <!-- フェーズストリップ -->
    <div id="phase-strip">
        <button id="strip-reset" onclick="resetCaptures()">🗑 全消去</button>
    </div>

    <!-- フェーズ詳細モーダル -->
    <div id="ph-modal">
        <img id="ph-modal-img" src="" alt="">
        <div id="ph-modal-info"></div>
        <div id="ph-modal-btns">
            <button class="ph-modal-btn danger" id="ph-modal-del">🗑 削除</button>
            <button class="ph-modal-btn" id="ph-modal-close">✕ 閉じる</button>
        </div>
    </div>

    <!-- 姿勢判定パネル -->
    <div id="judge-panel">
        <div id="judge-phase">🧍 検出中…</div>
        <div class="j-title">三重十文字</div>
        <div class="j-row" id="jj1"><span class="j-name">①肩水平</span><span>--</span></div>
        <div class="j-row" id="jj2"><span class="j-name">②腰水平</span><span>--</span></div>
        <div class="j-row" id="jj3"><span class="j-name">③体軸</span><span>--</span></div>
        <div id="judge-specific"></div>
    </div>

    <!-- 角度バッジ -->
    <div class="badge c-cyan" id="b-re">右肘 --°</div>
    <div class="badge c-cyan" id="b-le">左肘 --°</div>
    <div class="badge c-red"  id="b-sh">肩水平 --°</div>
    <div class="badge c-cyan" id="b-hi">腰水平 --°</div>
    <div class="badge c-grn"  id="b-ft">足水平 --°</div>

    <!-- 録画インジケーター -->
    <div id="rec-ind">
        <div class="rec-dot"></div>
        <span>REC</span>
        <span id="rec-time">0:00</span>
    </div>

    <!-- ヘッダー -->
    <div id="header">
        <div id="title-row" style="display:flex;align-items:center;justify-content:space-between">
            <span>🏹 弓道フォーム分析</span>
            <div style="display:flex;align-items:center;gap:12px">
                <div id="review-toggle" onclick="toggleReviewMode()">
                    <span id="review-label">見直し</span>
                    <div id="review-toggle-sw"></div>
                </div>
                <div id="auto-toggle" class="on" onclick="toggleAutoMode()">
                    <span id="auto-label">自動判定</span>
                    <div id="auto-toggle-sw"></div>
                </div>
            </div>
        </div>
        <div id="tabs">
            <button class="tab on" data-mode="cam">📷 カメラ</button>
            <button class="tab"    data-mode="photo">🖼 写真</button>
            <button class="tab"    data-mode="video">🎬 動画</button>
        </div>
    </div>

    <!-- アップロードエリア -->
    <div id="upload-area">
        <div class="upload-box">
            <span id="upload-icon">🖼</span>
            <button class="upload-btn" id="upload-btn">ファイルを選択</button>
            <p id="upload-hint">写真を選択してください</p>
        </div>
        <input type="file" id="file-input" style="display:none">
    </div>

    <!-- シークバー（動画モード） -->
    <div id="seek-wrap">
        <input type="range" id="seekbar" min="0" max="100" value="0" step="0.1">
        <div id="time-lbl">0:00 / 0:00</div>
    </div>

    <!-- コマ操作（シークバーのすぐ下） -->
    <div id="frame-ctrl">
        <button class="btn" id="btn-frame-back">⏮ コマ戻し</button>
        <button class="btn" id="btn-play">▶ 再生</button>
        <button class="btn" id="btn-frame-fwd">⏭ コマ送り</button>
    </div>

    <div id="noperson">人物を画面に映してください</div>

    <!-- フッター -->
    <div id="footer">
        <!-- カメラ操作 -->
        <div id="cam-ctrl" style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
            <button class="btn" id="btn-flip">↔ 反転</button>
            <button class="btn" id="btn-switch">📷 前後</button>
            <button class="btn" id="btn-rec">⏺ 録画</button>
        </div>
        <!-- 動画操作（フッター：0.5x・コマ幅・動画変更のみ） -->
        <div id="vid-ctrl" style="display:none;flex-direction:column;gap:8px;align-items:center">
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center">
                <button class="btn" id="btn-slow">🐢 0.5x</button>
                <span style="font-size:12px;color:rgba(255,255,255,.7)">コマ幅:</span>
                <button class="step-btn" data-step="0.0167">1/60s</button>
                <button class="step-btn on" data-step="0.0333">1/30s</button>
                <button class="step-btn" data-step="0.0417">1/24s</button>
                <button class="step-btn" data-step="0.1">0.1s</button>
                <button class="step-btn" data-step="0.5">0.5s</button>
                <button class="btn hi" id="btn-vid-open">動画を変更</button>
            </div>
        </div>
        <!-- 写真操作 -->
        <div id="photo-ctrl" style="display:none;gap:10px">
            <button class="btn hi" id="btn-photo-open">🖼 写真を変更</button>
        </div>
    </div>

    <div id="loading">
        <div class="spin"></div>
        <div id="load-msg">
            <b>🏹 弓道フォーム分析</b>
            AIモデルを読み込んでいます…<br>
            <small>初回は20〜30秒かかります</small>
        </div>
    </div>
</div>

<script type="module">
import { PoseLandmarker, FilesetResolver }
    from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

// ── DOM ─────────────────────────────────────────────────────
const camVideo  = document.getElementById('cam-video');
const fileVideo = document.getElementById('file-video');
const bgCanvas  = document.getElementById('bg-canvas');
const overlay   = document.getElementById('overlay');
const bgCtx     = bgCanvas.getContext('2d');
const ovCtx     = overlay.getContext('2d');
const loadMsg   = document.getElementById('load-msg');
const noperson  = document.getElementById('noperson');
const seekbar   = document.getElementById('seekbar');
const timeLbl   = document.getElementById('time-lbl');

// ── State ────────────────────────────────────────────────────
let landmarker;
let mode = 'cam';
let camRafId, vidRafId;
let flipped = false, facing = 'environment';
let photoImg = null;
let slowMode = false;

// ── 録画 State ───────────────────────────────────────────────
let mediaRecorder = null;
let recordChunks  = [];
let recTimerID    = null;
let recSecs       = 0;
const recCanvas   = document.createElement('canvas');
const recCtx      = recCanvas.getContext('2d');

// ── Landmark ─────────────────────────────────────────────────
const K = {LS:11,RS:12,LE:13,RE:14,LW:15,RW:16,LH:23,RH:24,LK:25,RK:26,LA:27,RA:28};
const BONES = [
    [K.LS,K.RS,'#4caf50'],
    [K.LS,K.LE,'#42a5f5'],[K.LE,K.LW,'#42a5f5'],
    [K.RS,K.RE,'#ffa726'],[K.RE,K.RW,'#ffa726'],
    [K.LS,K.LH,'#4caf50'],[K.RS,K.RH,'#4caf50'],[K.LH,K.RH,'#4caf50'],
    [K.LH,K.LK,'#4caf50'],[K.LK,K.LA,'#4caf50'],
    [K.RH,K.RK,'#4caf50'],[K.RK,K.RA,'#4caf50']
];

// ── 座標変換 ─────────────────────────────────────────────────
function getT() {
    let vw, vh;
    if(mode==='cam'){vw=camVideo.videoWidth||1;vh=camVideo.videoHeight||1;}
    else if(mode==='photo'){vw=photoImg?.naturalWidth||1;vh=photoImg?.naturalHeight||1;}
    else{vw=fileVideo.videoWidth||1;vh=fileVideo.videoHeight||1;}
    const cw=overlay.width,ch=overlay.height,s=Math.min(cw/vw,ch/vh);
    return{s,ox:(cw-vw*s)/2,oy:(ch-vh*s)/2,vw,vh};
}
const toX=(lm,t)=>lm.x*t.vw*t.s+t.ox;
const toY=(lm,t)=>lm.y*t.vh*t.s+t.oy;

// ── 角度 ─────────────────────────────────────────────────────
function angle3(a,b,c){
    const[ax,ay]=[a.x-b.x,a.y-b.y],[cx,cy]=[c.x-b.x,c.y-b.y];
    return Math.round(Math.acos(Math.max(-1,Math.min(1,
        (ax*cx+ay*cy)/(Math.hypot(ax,ay)*Math.hypot(cx,cy)||1))))*180/Math.PI);
}
const tiltDeg=(a,b)=>Math.round(Math.atan2(b.y-a.y,b.x-a.x)*1800/Math.PI)/10;
const midLm=(a,b)=>({x:(a.x+b.x)/2,y:(a.y+b.y)/2});
const isVis=(ls,i)=>(ls[i]?.visibility??0)>=0.45;

// ── 骨格描画 ─────────────────────────────────────────────────
function drawSkeleton(ls){
    const t=getT();
    ovCtx.save();ovCtx.setLineDash([12,8]);
    ovCtx.strokeStyle='rgba(0,255,60,0.28)';ovCtx.lineWidth=1.5;
    ovCtx.beginPath();
    ovCtx.moveTo(t.ox+t.vw*t.s/2,t.oy);
    ovCtx.lineTo(t.ox+t.vw*t.s/2,t.oy+t.vh*t.s);
    ovCtx.stroke();ovCtx.restore();
    ovCtx.lineCap='round';
    for(const[ai,bi,col] of BONES){
        const a=ls[ai],b=ls[bi];
        if(!a||!b||a.visibility<.35||b.visibility<.35) continue;
        ovCtx.beginPath();ovCtx.strokeStyle=col;ovCtx.lineWidth=4;
        ovCtx.moveTo(toX(a,t),toY(a,t));ovCtx.lineTo(toX(b,t),toY(b,t));ovCtx.stroke();
    }
    for(const i of Object.values(K)){
        const lm=ls[i];if(!lm||lm.visibility<.35) continue;
        ovCtx.beginPath();
        ovCtx.fillStyle='#fff';ovCtx.strokeStyle='#333';ovCtx.lineWidth=1.5;
        ovCtx.arc(toX(lm,t),toY(lm,t),6,0,2*Math.PI);ovCtx.fill();ovCtx.stroke();
    }
}

// ── 三重十文字 基準線オーバーレイ（見直しモード時） ──────────
//  ピンク＝標準（理想）の鉛直中心線＋肩・腰・足の水平線
//  水色＝実際の体の線（肩・腰・足＋体軸）。両者を並べてズレを比較する
function drawJumonjiGuide(ls){
    // 肩・腰が見えていなければ描画しない
    if(!(isVis(ls,K.LS)&&isVis(ls,K.RS)&&isVis(ls,K.LH)&&isVis(ls,K.RH))) return;
    const t=getT();
    const PX=lm=>lm.x*t.vw*t.s+t.ox;
    const PY=lm=>lm.y*t.vh*t.s+t.oy;

    // 各部位の中心（画面ピクセル）
    const shX=(PX(ls[K.LS])+PX(ls[K.RS]))/2, shY=(PY(ls[K.LS])+PY(ls[K.RS]))/2;
    const hiX=(PX(ls[K.LH])+PX(ls[K.RH]))/2, hiY=(PY(ls[K.LH])+PY(ls[K.RH]))/2;
    const ankleVis=(ls[K.LA]?.visibility??0)>.3&&(ls[K.RA]?.visibility??0)>.3;
    const ftX=ankleVis?(PX(ls[K.LA])+PX(ls[K.RA]))/2:hiX;
    const ftY=ankleVis?(PY(ls[K.LA])+PY(ls[K.RA]))/2:hiY+(hiY-shY);

    // 理想の鉛直軸X（足元の中心。なければ腰中心）
    const cx  = ftX;
    const shW = Math.abs(PX(ls[K.LS])-PX(ls[K.RS]));
    const halfW = Math.max(60, shW*0.95);   // 横線の長さ
    const topY  = shY-(hiY-shY)*0.7;         // 中心線の上端（頭付近）

    ovCtx.save();
    ovCtx.lineCap='round';

    // ── 標準線（ピンク・実線）──────────────────────────────
    ovCtx.strokeStyle='rgba(255,45,120,0.92)';
    ovCtx.lineWidth=2.5;
    ovCtx.setLineDash([]);
    // 中心線（鉛直）
    ovCtx.beginPath();ovCtx.moveTo(cx,topY);ovCtx.lineTo(cx,ftY);ovCtx.stroke();
    // 肩・腰・足の水平線（鉛直に直角）
    const hline=y=>{ovCtx.beginPath();ovCtx.moveTo(cx-halfW,y);ovCtx.lineTo(cx+halfW,y);ovCtx.stroke();};
    hline(shY);hline(hiY);hline(ftY);
    // 十字の節（交点マーカー）
    ovCtx.fillStyle='rgba(255,45,120,0.95)';
    [[cx,shY],[cx,hiY],[cx,ftY]].forEach(([x,y])=>{
        ovCtx.beginPath();ovCtx.arc(x,y,4,0,2*Math.PI);ovCtx.fill();
    });

    // ── 実際の線（水色・破線）比較用 ──────────────────────
    ovCtx.strokeStyle='rgba(0,229,255,0.9)';
    ovCtx.lineWidth=2;
    ovCtx.setLineDash([7,5]);
    const aline=(a,b)=>{ovCtx.beginPath();ovCtx.moveTo(PX(a),PY(a));ovCtx.lineTo(PX(b),PY(b));ovCtx.stroke();};
    aline(ls[K.LS],ls[K.RS]);   // 実際の肩線
    aline(ls[K.LH],ls[K.RH]);   // 実際の腰線
    if(ankleVis) aline(ls[K.LA],ls[K.RA]); // 実際の足線
    // 実際の体軸（肩中心→腰中心→足中心）
    ovCtx.beginPath();ovCtx.moveTo(shX,shY);ovCtx.lineTo(hiX,hiY);
    if(ankleVis) ovCtx.lineTo(ftX,ftY);
    ovCtx.stroke();

    ovCtx.restore();
}

// ── バッジ ───────────────────────────────────────────────────
function place(el,nlx,nly,dx,dy){
    const t=getT();
    const x=nlx*t.vw*t.s+t.ox+dx,y=nly*t.vh*t.s+t.oy+dy;
    el.style.left=Math.max(2,x)+'px';el.style.top=Math.max(2,y)+'px';el.style.display='block';
}
const hideBadge=el=>el.style.display='none';
const hideAll=()=>document.querySelectorAll('.badge').forEach(hideBadge);

function updateBadges(ls){
    const g=id=>document.getElementById(id);
    const t=getT();
    const PX=lm=>lm.x*t.vw*t.s+t.ox;   // ランドマーク→画面ピクセルX
    const PY=lm=>lm.y*t.vh*t.s+t.oy;   // ランドマーク→画面ピクセルY

    // 表示するバッジを収集（edgeX=体から逃がす境界、dir=-1左/+1右、ay=縦位置）
    const specs=[];

    // 右肘（馬手・画面左）→ 肘の左へ
    const re=g('b-re');
    if(isVis(ls,K.RS)&&isVis(ls,K.RE)&&isVis(ls,K.RW)){
        re.textContent=`右肘 ${angle3(ls[K.RS],ls[K.RE],ls[K.RW])}°`;
        specs.push({el:re, edgeX:PX(ls[K.RE])-10, dir:-1, ay:PY(ls[K.RE])});
    }else hideBadge(re);

    // 左肘（弓手・画面右）→ 肘の右へ
    const le=g('b-le');
    if(isVis(ls,K.LS)&&isVis(ls,K.LE)&&isVis(ls,K.LW)){
        le.textContent=`左肘 ${angle3(ls[K.LS],ls[K.LE],ls[K.LW])}°`;
        specs.push({el:le, edgeX:PX(ls[K.LE])+10, dir:+1, ay:PY(ls[K.LE])});
    }else hideBadge(le);

    // 肩水平 → 肩の外側（左）へ逃がす（体と重ならない）
    const sh=g('b-sh');
    if(isVis(ls,K.LS)&&isVis(ls,K.RS)){
        const d=tiltDeg(ls[K.RS],ls[K.LS]);
        sh.textContent=`肩水平 ${d>0?'+':''}${d}°`;
        specs.push({el:sh, edgeX:Math.min(PX(ls[K.LS]),PX(ls[K.RS]))-14, dir:-1,
                    ay:(PY(ls[K.LS])+PY(ls[K.RS]))/2});
    }else hideBadge(sh);

    // 腰水平 → 腰の外側（左）へ逃がす
    const hi=g('b-hi');
    if(isVis(ls,K.LH)&&isVis(ls,K.RH)){
        const d=tiltDeg(ls[K.RH],ls[K.LH]);
        hi.textContent=`腰水平 ${d>0?'+':''}${d}°`;
        specs.push({el:hi, edgeX:Math.min(PX(ls[K.LH]),PX(ls[K.RH]))-14, dir:-1,
                    ay:(PY(ls[K.LH])+PY(ls[K.RH]))/2});
    }else hideBadge(hi);

    // 足水平 → 足の外側（右）へ逃がす
    const ft=g('b-ft');
    if((ls[K.LA]?.visibility??0)>.3&&(ls[K.RA]?.visibility??0)>.3){
        const d=tiltDeg(ls[K.RA],ls[K.LA]);
        ft.textContent=`足水平 ${d>0?'+':''}${d}°`;
        specs.push({el:ft, edgeX:Math.max(PX(ls[K.LA]),PX(ls[K.RA]))+14, dir:+1,
                    ay:(PY(ls[K.LA])+PY(ls[K.RA]))/2});
    }else hideBadge(ft);

    layoutBadges(specs);
}

// ── バッジ衝突回避レイアウト ─────────────────────────────────
//  体の外側へ寄せたうえで、バッジ同士の重なりを縦方向に押し分ける
function layoutBadges(specs){
    if(!specs.length) return;
    const host=document.getElementById('app');
    const W=host.clientWidth, H=host.clientHeight;
    const PAD=5;

    // 初期配置（dir側へ配置し、画面内にクランプ）
    for(const s of specs){
        s.el.style.display='block';
        s.w=s.el.offsetWidth; s.h=s.el.offsetHeight;
        let left = s.dir<0 ? s.edgeX - s.w : s.edgeX;
        left = Math.max(2, Math.min(W - s.w - 2, left));
        let top  = Math.max(2, Math.min(H - s.h - 2, s.ay - s.h/2));
        s.left=left; s.top=top;
    }

    // 重なり解消（数回反復して縦に押し分ける）
    for(let iter=0; iter<8; iter++){
        let moved=false;
        for(let i=0;i<specs.length;i++){
            for(let j=i+1;j<specs.length;j++){
                const a=specs[i], b=specs[j];
                const ox=Math.min(a.left+a.w, b.left+b.w)-Math.max(a.left, b.left);
                const oy=Math.min(a.top+a.h, b.top+b.h)-Math.max(a.top, b.top);
                if(ox>0 && oy>0){           // 矩形が重なっている
                    const push=oy/2 + PAD;
                    if(a.top<=b.top){ a.top-=push; b.top+=push; }
                    else            { a.top+=push; b.top-=push; }
                    moved=true;
                }
            }
        }
        if(!moved) break;
    }

    // 最終クランプして反映
    for(const s of specs){
        s.top=Math.max(2, Math.min(H - s.h - 2, s.top));
        s.el.style.left=Math.round(s.left)+'px';
        s.el.style.top =Math.round(s.top)+'px';
    }
}

function syncCanvas(){
    overlay.width=overlay.clientWidth;overlay.height=overlay.clientHeight;
    bgCanvas.width=bgCanvas.clientWidth;bgCanvas.height=bgCanvas.clientHeight;
}

function onResult(r){
    const ls=r.landmarks?.[0]??null;
    if(ls){
        noperson.style.display='none';
        drawSkeleton(ls);
        if(reviewMode) drawJumonjiGuide(ls);   // 三重十文字 基準線
        updateBadges(ls);
        const pose=classifyPose(ls);
        updateJudgePanel(ls,pose);
        onPhaseDetected(pose.phase,ls);
    }else{
        noperson.style.display='block';
        hideAll();
        document.getElementById('judge-panel').classList.remove('show');
        currentLandmarks=null;
    }
}

// ================================================================
//  射法八節フェーズ分類（日本武道館資料準拠）
// ================================================================
function classifyPose(ls){
    const need=[K.LS,K.RS,K.LE,K.RE,K.LW,K.RW,K.LH,K.RH];
    if(!need.every(i=>(ls[i]?.visibility??0)>0.4))
        return {label:'検出中…',emoji:'👤',color:'#9e9e9e',phase:'unknown'};

    const leAng = angle3(ls[K.LS],ls[K.LE],ls[K.LW]); // 弓手（左）肘角度
    const reAng = angle3(ls[K.RS],ls[K.RE],ls[K.RW]); // 馬手（右）肘角度

    const sY    = (ls[K.LS].y + ls[K.RS].y) / 2;
    const hY    = (ls[K.LH].y + ls[K.RH].y) / 2;
    const lwY   = ls[K.LW].y, rwY = ls[K.RW].y;
    const avgWY = (lwY + rwY) / 2;

    // 位置判定フラグ
    const bothAboveShoulder = lwY < sY-0.04 && rwY < sY-0.04;     // 打起し以降
    const wristNearShoulder = Math.abs(lwY-sY)<0.15 && Math.abs(rwY-sY)<0.15; // 残心（肩高さ付近）
    const wristMidZone      = avgWY > sY+0.04 && avgWY < hY-0.03; // 弓構えゾーン
    const wristAtHip        = Math.abs(lwY-hY)<0.14 && Math.abs(rwY-hY)<0.14; // 腰骨付近

    // 腕の横広がり比率（残心判定補助：肩幅比）
    const spreadRatio = Math.abs(ls[K.LW].x-ls[K.RW].x) /
                        Math.max(0.01, Math.abs(ls[K.LS].x-ls[K.RS].x));

    // ① 会：弓手ほぼ真っすぐ(>155°)、馬手深く引(<110°)、両手首が肩より上
    if(leAng>155 && reAng<110 && bothAboveShoulder)
        return {label:'会',emoji:'🎯',color:'#ff9800',phase:'kai'};

    // ② 残心：会の後、腕が横に大きく広がる
    //   条件A: 両肘ほぼ真っすぐ(>130°)、手首が肩付近または上
    //   条件B: 弓手が伸びていて、腕が大きく広がっている（馬手検出エラー対応）
    const zanshinA = leAng>130 && reAng>130 && (bothAboveShoulder||wristNearShoulder);
    const zanshinB = leAng>130 && spreadRatio>1.20 && (bothAboveShoulder||wristNearShoulder);
    if(zanshinA || zanshinB)
        return {label:'残心',emoji:'✨',color:'#e040fb',phase:'zanshin'};

    // ③ 引分け：両手首が肩より上、弓手が馬手より20°以上伸びている（大三含む）
    if(bothAboveShoulder && leAng>reAng+20)
        return {label:'大三',emoji:'↔',color:'#42a5f5',phase:'hikiwake'};

    // ④ 打起し：両手首が肩より上、ほぼ左右対称
    if(bothAboveShoulder)
        return {label:'打起し',emoji:'⬆',color:'#26c6da',phase:'uchiokoshi'};

    // ⑤ 足踏み：足が広がり（腰幅以上）、腕が体側に下がっている
    //   資料より：矢束を標準として外八文字（約60度）に踏み開く
    const ankleVis=(ls[K.LA]?.visibility??0)>0.35&&(ls[K.RA]?.visibility??0)>0.35;
    if(ankleVis){
        const ankleW       = Math.abs(ls[K.LA].x - ls[K.RA].x);
        const hipW         = Math.abs(ls[K.LH].x - ls[K.RH].x);
        const feetWide     = (ankleW / Math.max(0.01, hipW)) > 1.05; // 足幅が腰幅以上
        const armsDown     = lwY > hY-0.06 && rwY > hY-0.06;        // 手首が腰付近以下
        const elbowsNatural = leAng > 120 && reAng > 120;            // 肘が深く曲がっていない
        if(feetWide && armsDown && elbowsNatural)
            return {label:'足踏み',emoji:'👣',color:'#a5d6a7',phase:'ashibumi'};
    }

    // ⑥ 執弓の姿勢：両肘が深く曲がっている(<105°)→ 円相の形
    //   弓構えより深く肘を曲げて腰付近または中間ゾーンに構える
    if(leAng<105 && reAng<105)
        return {label:'執弓の姿勢',emoji:'⭕',color:'#00e5ff',phase:'toriyu'};

    // ⑦ 弓構え：手首が肩と腰の中間ゾーン、肘が軽く張った状態(105°〜155°)
    //   資料より：左右の肘を軽く張り大木を抱えた気持ち
    //   弓懐（弓と体の間に空間）を作るため肘が自然に外に張る
    const elbowSpread = Math.abs(ls[K.LE].x - ls[K.RE].x);
    const shoulderW   = Math.abs(ls[K.LS].x - ls[K.RS].x);
    const elbowWider  = elbowSpread > shoulderW * 0.85; // 肘が肩幅以上に張っている
    if(wristMidZone && leAng>=105 && reAng>=105 && leAng<155 && reAng<155 && elbowWider)
        return {label:'弓構え',emoji:'🏹',color:'#66bb6a',phase:'yugamae'};

    // ⑧ 胴造り：腕が体側に自然に下がり直立している状態
    //   資料より：腰・肩の線を足踏みの線と平行に、重心を総体の中央に
    //   膕（ひかがみ）を伸す、気息をととのえる
    const armsRelaxed  = lwY > hY-0.08 && rwY > hY-0.08; // 手首が腰付近以下
    const elbowsLoose  = leAng > 130 && reAng > 130;      // 肘が大きく曲がっていない
    if(armsRelaxed && elbowsLoose)
        return {label:'胴造り',emoji:'🧍',color:'#bdbdbd',phase:'dozukuri'};

    // ⑨ それ以外：胴造りとして扱う
    return {label:'胴造り',emoji:'🧍',color:'#bdbdbd',phase:'dozukuri'};
}

// ── 三重十文字判定（全フェーズ共通） ────────────────────────
function judgeJumonji(ls){
    const sc=(v,t1,t2)=>v<t1?{mark:'◎',cls:'sc-good'}:v<t2?{mark:'○',cls:'sc-ok'}:{mark:'△',cls:'sc-bad'};
    const shT = Math.abs(tiltDeg(ls[K.RS],ls[K.LS]));          // ①肩の水平
    const hiT = Math.abs(tiltDeg(ls[K.RH],ls[K.LH]));          // ②腰の水平
    const axD = Math.abs(                                        // ③体軸の垂直
        (ls[K.LS].x+ls[K.RS].x)/2 - (ls[K.LH].x+ls[K.RH].x)/2)*100;
    return [
        {name:'①肩水平', val:shT.toFixed(1)+'°', ...sc(shT,2,5)},
        {name:'②腰水平', val:hiT.toFixed(1)+'°', ...sc(hiT,2,5)},
        {name:'③体軸',   val:axD.toFixed(1)+'%', ...sc(axD,3,7)}
    ];
}

// ── フェーズ別チェック ───────────────────────────────────────
function judgePhaseSpecific(ls, phase){
    const sc=(v,t1,t2)=>v<t1?{mark:'◎',cls:'sc-good'}:v<t2?{mark:'○',cls:'sc-ok'}:{mark:'△',cls:'sc-bad'};
    const checks=[];

    if(phase==='dozukuri'){
        // 胴造りチェック（資料：腰・肩の線を平行に、重心を中央に）
        // ①肩の水平（三重十文字①と同じ軸で確認）
        const shT2 = Math.abs(tiltDeg(ls[K.RS],ls[K.LS]));
        checks.push({name:'肩の水平', val:shT2.toFixed(1)+'°', ...sc(shT2,2,5)});
        // ②腰の水平
        const hiT2 = Math.abs(tiltDeg(ls[K.RH],ls[K.LH]));
        checks.push({name:'腰の水平', val:hiT2.toFixed(1)+'°', ...sc(hiT2,2,5)});
        // ③体の中心（肩中心と腰中心のx座標のずれ）
        const axD2 = Math.abs(
            (ls[K.LS].x+ls[K.RS].x)/2 - (ls[K.LH].x+ls[K.RH].x)/2)*100;
        checks.push({name:'重心中央', val:axD2.toFixed(1)+'%', ...sc(axD2,3,7)});
    }

    if(phase==='yugamae'){
        // 弓構えチェック（資料：左右の肘を軽く張り大木を抱えた気持ち）
        // ①弓懐：肘の張り（肘幅が肩幅以上か）
        const eW2  = Math.abs(ls[K.LE].x - ls[K.RE].x);
        const sW2  = Math.abs(ls[K.LS].x - ls[K.RS].x);
        const eRat = (eW2/Math.max(0.01,sW2))*100;
        checks.push({name:'弓懐（肘張）', val:eRat.toFixed(0)+'%', ...sc(Math.abs(eRat-110),0,20)});
        // ②両肘の左右均等（左右の肘の高さの差）
        const eBal = Math.abs(ls[K.LE].y - ls[K.RE].y)*100;
        checks.push({name:'肘均等', val:eBal.toFixed(1)+'%', ...sc(eBal,3,8)});
    }

    if(phase==='toriyu'){
        // 執弓の姿勢チェック
        // 手首の高さ：腰骨に付けているか（腰との差）
        const hY   = (ls[K.LH].y+ls[K.RH].y)/2;
        const wErr = ((Math.abs(ls[K.LW].y-hY)+Math.abs(ls[K.RW].y-hY))/2)*100;
        checks.push({name:'手首高さ', val:wErr.toFixed(0)+'%off', ...sc(wErr,5,12)});
        // 円相：肘の広がりが肩幅以上か（両腕と両肩が一直線）
        const sW  = Math.abs(ls[K.LS].x-ls[K.RS].x);
        const eW  = Math.abs(ls[K.LE].x-ls[K.RE].x);
        const ens = Math.abs((eW/sW)*100-115); // 肩幅の115%が理想
        checks.push({name:'円相',     val:(eW/sW*100).toFixed(0)+'%', ...sc(ens,10,25)});
    }

    if(phase==='uchiokoshi'){
        // 打起し：両拳が同じ高さか（左右均等）
        const hDiff = Math.abs(ls[K.LW].y-ls[K.RW].y)*100;
        checks.push({name:'両拳均等', val:hDiff.toFixed(1)+'%', ...sc(hDiff,3,7)});
        // 高さ：肩より上に十分打起せているか
        const sY   = (ls[K.LS].y+ls[K.RS].y)/2;
        const hAbv = (sY-(ls[K.LW].y+ls[K.RW].y)/2)*100;
        checks.push({name:'高さ',     val:hAbv.toFixed(0)+'%', ...sc(Math.abs(hAbv-8),0,5)});
    }

    if(phase==='hikiwake'){
        // 引分け：弓手の伸び（大きく押せているか）
        const leA = angle3(ls[K.LS],ls[K.LE],ls[K.LW]);
        checks.push({name:'弓手の伸び', val:leA+'°', ...sc(Math.abs(leA-140),0,20)});
        // 両肩の線が矢に接近（肩の左右均等な下がり）
        const sT  = Math.abs(tiltDeg(ls[K.RS],ls[K.LS]));
        checks.push({name:'肩均等',    val:sT.toFixed(1)+'°', ...sc(sT,3,7)});
    }

    if(phase==='zanshin'){
        // 残心チェック（資料：両拳が肩の高さになる）
        const sY2  = (ls[K.LS].y + ls[K.RS].y) / 2;
        // ①両拳の高さ（肩の高さに揃っているか）
        const lwDiff = Math.abs(ls[K.LW].y - sY2)*100;
        const rwDiff = Math.abs(ls[K.RW].y - sY2)*100;
        const wristH = (lwDiff + rwDiff) / 2;
        checks.push({name:'拳の高さ', val:wristH.toFixed(0)+'%off', ...sc(wristH,8,18)});
        // ②両拳の左右均等（高さが揃っているか）
        const whBal = Math.abs(ls[K.LW].y - ls[K.RW].y)*100;
        checks.push({name:'左右均等', val:whBal.toFixed(1)+'%', ...sc(whBal,4,10)});
        // ③腕の広がり（左右に十分開いているか）
        const spreadR2 = Math.abs(ls[K.LW].x-ls[K.RW].x) /
                         Math.max(0.01, Math.abs(ls[K.LS].x-ls[K.RS].x));
        checks.push({name:'腕の広がり', val:(spreadR2*100).toFixed(0)+'%', ...sc(Math.abs(spreadR2*100-150),0,30)});
    }

    if(phase==='kai'){
        // 会チェック：弓手の張り（ほぼ真っすぐ）
        const leA = angle3(ls[K.LS],ls[K.LE],ls[K.LW]);
        checks.push({name:'弓手伸び', val:leA+'°', ...sc(Math.abs(leA-170),0,15)});
        // 馬手の引き（90°前後が理想）
        const reA = angle3(ls[K.RS],ls[K.RE],ls[K.RW]);
        checks.push({name:'馬手引き', val:reA+'°', ...sc(Math.abs(reA-95),0,15)});
        // 五重十文字の核心：肩水平（矢と肩線）
        const shT = Math.abs(tiltDeg(ls[K.RS],ls[K.LS]));
        checks.push({name:'肩×矢', val:shT.toFixed(1)+'°', ...sc(shT,2,5)});
    }

    return checks;
}

// ── 判定パネル更新 ───────────────────────────────────────────
function updateJudgePanel(ls,pose){
    const panel=document.getElementById('judge-panel');
    if(!ls||!pose){panel.classList.remove('show');return;}
    panel.classList.add('show');

    document.getElementById('judge-phase').innerHTML=
        `<span style="color:${pose.color}">${pose.emoji} ${pose.label}</span>`;

    judgeJumonji(ls).forEach((r,i)=>{
        document.getElementById(`jj${i+1}`).innerHTML=
            `<span class="j-name">${r.name}</span>`+
            `<span><span class="${r.cls}">${r.mark}</span> ${r.val}</span>`;
    });

    const spec=judgePhaseSpecific(ls,pose.phase);
    const specEl=document.getElementById('judge-specific');
    if(spec.length>0){
        specEl.style.display='block';
        specEl.innerHTML=
            '<div class="j-title" style="margin-top:6px;padding-top:6px;'
           +'border-top:1px solid rgba(255,255,255,.15)">姿勢チェック</div>'
           +spec.map(r=>
                `<div class="j-row"><span class="j-name">${r.name}</span>`+
                `<span><span class="${r.cls}">${r.mark}</span> ${r.val}</span></div>`
            ).join('');
    }else{
        specEl.style.display='none';
    }
}

    {key:'dozukuri',  label:'胴造り', emoji:'🧍'},

    {key:'hikiwake',  label:'大三',   emoji:'↔'},
    {key:'kai',       label:'会',     emoji:'🎯'},
    {key:'zanshin',   label:'残心',   emoji:'✨'},
];
let phaseCaptures={}, currentLandmarks=null;
let lastPhaseKey=null, phaseHoldTimer=null, modalPhaseKey=null;
let autoMode=true; // 自動判定ON/OFF
let reviewMode=false; // 見直しモードON/OFF

// ── 見直しモードトグル ──────────────────────────────────────
window.toggleReviewMode=function toggleReviewMode(){

// ── 自動判定トグル ──────────────────────────────────────────
window.toggleAutoMode=function toggleAutoMode(){

    const tog=document.getElementById('auto-toggle');
    const lbl=document.getElementById('auto-label');
    if(autoMode){
        tog.classList.add('on');

function initPhaseStrip(){
    const strip=document.getElementById('phase-strip');
    const resetBtn=document.getElementById('strip-reset');
    strip.innerHTML='';
    strip.appendChild(resetBtn);
    PHASES.forEach(p=>{
        const slot=document.createElement('div');
        slot.className='ph-slot';slot.dataset.key=p.key;
        slot.innerHTML=
            `<canvas class="ph-thumb" id="th-${p.key}" width="62" height="44"></canvas>`+
            `<div class="ph-name">${p.emoji} ${p.label}</div>`+
            `<div class="ph-score" id="sc-${p.key}">―</div>`+
            `<button class="ph-snap" onclick="event.stopPropagation();capturePhase('${p.key}')">📸</button>`;
        slot.addEventListener('click',()=>{
            if(reviewMode && phaseCaptures[p.key]?.videoTime!=null){
                // 見直しモード＆記録済み → 記録時刻にジャンプ＆一時停止
                jumpToCapture(p.key);
            }else if(autoMode){
                // 自動モード：キャプチャ済みならモーダル表示
                openModal(p.key);
            }else{
                // 手動モード：動画を止めてそのフレームで判定・記録
                manualCapture(p.key);
            }
        });
        strip.appendChild(slot);
    });
}

// ── 見直しジャンプ（見直しモード専用） ────────────────────
async function jumpToCapture(key){
    const cap=phaseCaptures[key];
    if(!cap||cap.videoTime==null||mode!=='video'||!fileVideo.src) return;

    // 指定時刻にシーク
    fileVideo.pause();
    fileVideo.currentTime=cap.videoTime;
    document.getElementById('btn-play').textContent='▶ 再生';

    // シーク完了を待つ
    await new Promise(r=>{
        const onSeeked=()=>{fileVideo.removeEventListener('seeked',onSeeked);r();};
        fileVideo.addEventListener('seeked',onSeeked);
        setTimeout(r,500); // タイムアウト保険
    });

    // 骨格を再検出・描画
    if(fileVideo.readyState>=2){
        syncCanvas();
        ovCtx.clearRect(0,0,overlay.width,overlay.height);
        try{
            const result=landmarker.detectForVideo(fileVideo,performance.now());
            const ls=result.landmarks?.[0]??null;
            if(ls){
                currentLandmarks=ls;
                drawSkeleton(ls);
                updateBadges(ls);
                const pose=classifyPose(ls);
                updateJudgePanel(ls,pose);
            }
        }catch(e){}
    }

    // スロットをフラッシュ
    const slot=document.querySelector(`.ph-slot[data-key="${key}"]`);
    if(slot){
        slot.style.background='rgba(255,152,0,.35)';
        setTimeout(()=>slot.style.background='',400);
    }
}

// ── 手動キャプチャ（手動モード専用） ──────────────────────
async function manualCapture(key){
    // 動画モードなら一時停止
    if(mode==='video'&&fileVideo.src&&!fileVideo.paused){
        fileVideo.pause();
        document.getElementById('btn-play').textContent='▶ 再生';
        // 一時停止直後はフレームが確定するまで少し待つ
        await new Promise(r=>setTimeout(r,80));
    }
    // カメラモードは流れているまま現在フレームを使う
    // 骨格検出を1回実行してcurrentLandmarksを更新
    let result=null;
    if(mode==='cam'&&camVideo.readyState>=2){
        result=landmarker.detectForVideo(camVideo,performance.now());
    }else if(mode==='video'&&fileVideo.readyState>=2){
        result=landmarker.detectForVideo(fileVideo,performance.now());
    }else if(mode==='photo'){
        result=landmarker.detect(photoImg);
    }
    if(result){
        const ls=result.landmarks?.[0]??null;
        if(ls){
            currentLandmarks=ls;
            // 骨格を再描画
            syncCanvas();
            ovCtx.clearRect(0,0,overlay.width,overlay.height);
            drawSkeleton(ls);
            updateBadges(ls);
            const pose=classifyPose(ls);
            updateJudgePanel(ls,pose);
        }
    }
    if(!currentLandmarks){
        // 骨格が取れない場合でもスナップショットだけ記録
    }
    // スロットをフラッシュして記録
    const slot=document.querySelector(`.ph-slot[data-key="${key}"]`);
    if(slot){
        slot.style.background='rgba(255,200,0,.25)';
        setTimeout(()=>slot.style.background='',300);
    }
    capturePhase(key);
    // 記録後にモーダルで確認
    setTimeout(()=>openModal(key),100);
}

function onPhaseDetected(phaseKey,ls){
    currentLandmarks=ls;
    if(!autoMode) return; // 手動モードでは自動ハイライト・自動キャプチャしない
    document.querySelectorAll('.ph-slot').forEach(el=>
        el.classList.toggle('ph-active',el.dataset.key===phaseKey));
    if(phaseKey===lastPhaseKey) return;
    lastPhaseKey=phaseKey;
    clearTimeout(phaseHoldTimer);
    if(phaseKey!=='unknown'){
        phaseHoldTimer=setTimeout(()=>{
            if(!phaseCaptures[phaseKey]&&currentLandmarks) capturePhase(phaseKey);
        },900);
    }
}

window.capturePhase=function capturePhase(key){
    if(!currentLandmarks) return;
    const cap=document.createElement('canvas');
    cap.width=240;cap.height=170;
    const cc=cap.getContext('2d');
    cc.fillStyle='#000';cc.fillRect(0,0,240,170);
    const src=mode==='cam'?camVideo:mode==='video'?fileVideo:null;
    if(src&&src.readyState>=2){
        const vw=src.videoWidth||1,vh=src.videoHeight||1;
        const s=Math.min(240/vw,170/vh);
        cc.drawImage(src,(240-vw*s)/2,(170-vh*s)/2,vw*s,vh*s);
    }else if(mode==='photo'&&photoImg){
        const vw=photoImg.naturalWidth||1,vh=photoImg.naturalHeight||1;
        const s=Math.min(240/vw,170/vh);
        cc.drawImage(photoImg,(240-vw*s)/2,(170-vh*s)/2,vw*s,vh*s);
    }
    if(overlay.width>0)
        cc.drawImage(overlay,0,0,overlay.width,overlay.height,0,0,240,170);
    const jj=judgeJumonji(currentLandmarks);
    const tot=jj.reduce((n,r)=>n+(r.mark==='◎'?2:r.mark==='○'?1:0),0);
    const scoreText=jj.map(r=>`${r.name}${r.mark}`).join(' ');
    const mark=tot>=5?'◎':tot>=3?'○':'△';
    const cls=tot>=5?'sc-good':tot>=3?'sc-ok':'sc-bad';
    // 動画時刻を記録（見直しジャンプ用）
    const videoTime=(mode==='video'&&fileVideo.src)?fileVideo.currentTime:null;
    phaseCaptures[key]={dataUrl:cap.toDataURL('image/jpeg',0.88),scoreText,mark,videoTime};
    const th=document.getElementById(`th-${key}`);
    if(th){const tc=th.getContext('2d');tc.drawImage(cap,0,0,240,170,0,0,62,44);}
    const sc=document.getElementById(`sc-${key}`);
    if(sc){sc.textContent=mark;sc.className=`ph-score ${cls}`;}
    document.querySelector(`.ph-slot[data-key="${key}"]`)?.classList.add('ph-done');
}

function openModal(key){
    const cap=phaseCaptures[key];
    const p=PHASES.find(x=>x.key===key);
    if(!cap||!p) return;
    modalPhaseKey=key;
    document.getElementById('ph-modal-img').src=cap.dataUrl;
    document.getElementById('ph-modal-info').innerHTML=
        `<strong style="font-size:15px">${p.emoji} ${p.label}</strong><br>`+
        `<span class="${cap.mark==='◎'?'sc-good':cap.mark==='○'?'sc-ok':'sc-bad'}">`+
        `三重十文字 ${cap.mark}</span><br>`+
        `<small style="color:rgba(255,255,255,.6)">${cap.scoreText}</small>`;
    document.getElementById('ph-modal').classList.add('show');
}
document.getElementById('ph-modal-close').addEventListener('click',()=>
    document.getElementById('ph-modal').classList.remove('show'));
document.getElementById('ph-modal-del').addEventListener('click',()=>{
    if(!modalPhaseKey) return;
    delete phaseCaptures[modalPhaseKey];
    const th=document.getElementById(`th-${modalPhaseKey}`);
    if(th){th.getContext('2d').clearRect(0,0,62,44);}
    const sc=document.getElementById(`sc-${modalPhaseKey}`);
    if(sc){sc.textContent='―';sc.className='ph-score';}
    document.querySelector(`.ph-slot[data-key="${modalPhaseKey}"]`)?.classList.remove('ph-done');
    document.getElementById('ph-modal').classList.remove('show');
});
window.resetCaptures=function resetCaptures(){
    phaseCaptures={};
    PHASES.forEach(p=>{
        const th=document.getElementById(`th-${p.key}`);
        if(th) th.getContext('2d').clearRect(0,0,62,44);
        const sc=document.getElementById(`sc-${p.key}`);
        if(sc){sc.textContent='―';sc.className='ph-score';}
        document.querySelector(`.ph-slot[data-key="${p.key}"]`)?.classList.remove('ph-done');
    });
}

// ── 録画：開始 ──────────────────────────────────────────────
function startRec(){
    recCanvas.width  = overlay.clientWidth  || window.innerWidth;
    recCanvas.height = overlay.clientHeight || window.innerHeight;

    const stream = recCanvas.captureStream(30);
    const mime   = ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm']
        .find(t=>MediaRecorder.isTypeSupported(t)) || 'video/webm';

    mediaRecorder  = new MediaRecorder(stream, {mimeType: mime});
    recordChunks   = [];

    mediaRecorder.ondataavailable = e => { if(e.data.size>0) recordChunks.push(e.data); };
    mediaRecorder.onstop = () => {
        const blob = new Blob(recordChunks, {type: mime});
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        const ts   = new Date().toISOString().slice(0,19).replace(/[T:]/g,'-');
        a.href     = url;
        a.download = `kyudo-${ts}.webm`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(()=>URL.revokeObjectURL(url), 1000);
    };

    mediaRecorder.start(100);

    // UI
    document.getElementById('rec-ind').style.display = 'flex';
    document.getElementById('btn-rec').textContent   = '⏹ 停止';
    document.getElementById('btn-rec').classList.add('rec-on');
    recSecs = 0;
    recTimerID = setInterval(()=>{
        recSecs++;
        const m=Math.floor(recSecs/60), s=String(recSecs%60).padStart(2,'0');
        document.getElementById('rec-time').textContent = `${m}:${s}`;
    },1000);
}

// ── 録画：停止 ──────────────────────────────────────────────
function stopRec(){
    if(mediaRecorder?.state !== 'inactive') mediaRecorder?.stop();
    clearInterval(recTimerID);
    document.getElementById('rec-ind').style.display = 'none';
    document.getElementById('btn-rec').textContent   = '⏺ 録画';
    document.getElementById('btn-rec').classList.remove('rec-on');
}

// ── 録画用合成フレーム描画 ──────────────────────────────────
function drawRecFrame(){
    if(mediaRecorder?.state !== 'recording') return;
    const rw=recCanvas.width, rh=recCanvas.height;
    recCtx.fillStyle='#000';
    recCtx.fillRect(0,0,rw,rh);
    // 映像を recCanvas サイズに合わせて描画
    const vw=camVideo.videoWidth||1,vh=camVideo.videoHeight||1;
    const s=Math.min(rw/vw,rh/vh);
    const ox=(rw-vw*s)/2, oy=(rh-vh*s)/2;
    recCtx.drawImage(camVideo, ox, oy, vw*s, vh*s);
    // 骨格オーバーレイを合成（overlay→recCanvas にスケーリング）
    recCtx.drawImage(overlay, 0,0,overlay.width,overlay.height, 0,0,rw,rh);
}

// ── カメラループ ────────────────────────────────────────────
function camLoop(){
    camRafId = requestAnimationFrame(camLoop);
    if(camVideo.readyState<2) return;
    syncCanvas();
    ovCtx.clearRect(0,0,overlay.width,overlay.height);
    onResult(landmarker.detectForVideo(camVideo,performance.now()));
    drawRecFrame(); // 録画中のみ合成
}

// ── 動画ループ ──────────────────────────────────────────────
function vidLoop(){
    vidRafId=requestAnimationFrame(vidLoop);
    if(fileVideo.readyState<2) return;
    syncCanvas();ovCtx.clearRect(0,0,overlay.width,overlay.height);
    try{onResult(landmarker.detectForVideo(fileVideo,performance.now()));}catch(e){}
    if(fileVideo.duration){
        seekbar.value=(fileVideo.currentTime/fileVideo.duration)*100;
        timeLbl.textContent=fmt(fileVideo.currentTime)+' / '+fmt(fileVideo.duration);
    }
    if(fileVideo.ended) document.getElementById('btn-play').textContent='▶ 再生';
}

// ── 写真解析 ────────────────────────────────────────────────
function analyzePhoto(){
    if(!photoImg) return;
    syncCanvas();
    const t=getT();
    bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
    bgCtx.drawImage(photoImg,t.ox,t.oy,t.vw*t.s,t.vh*t.s);
    ovCtx.clearRect(0,0,overlay.width,overlay.height);
    onResult(landmarker.detect(photoImg));
}

// ── カメラ起動 ──────────────────────────────────────────────
async function startCamera(f){
    camVideo.srcObject?.getTracks().forEach(t=>t.stop());
    const s=await navigator.mediaDevices.getUserMedia(
        {video:{facingMode:f,width:{ideal:1280},height:{ideal:720}},audio:false});
    camVideo.srcObject=s;return camVideo.play();
}

// ── モード切替 ──────────────────────────────────────────────
async function switchMode(newMode){
    if(mode===newMode) return;
    stopRec();
    cancelAnimationFrame(camRafId);cancelAnimationFrame(vidRafId);
    camVideo.srcObject?.getTracks().forEach(t=>t.stop());
    fileVideo.pause();
    camVideo.classList.remove('show');fileVideo.classList.remove('show');bgCanvas.classList.remove('show');
    document.getElementById('seek-wrap').classList.remove('show');
    document.getElementById('frame-ctrl').classList.remove('show');
    hideAll();ovCtx.clearRect(0,0,overlay.width,overlay.height);noperson.style.display='none';
    mode=newMode;
    document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.mode===newMode));
    document.getElementById('cam-ctrl').style.display  = newMode==='cam'  ?'flex':'none';
    document.getElementById('vid-ctrl').style.display  = newMode==='video'?'flex':'none';
    document.getElementById('photo-ctrl').style.display= newMode==='photo'?'flex':'none';
    // 見直しSWは全モードで表示（十文字ガイド＋動画見直し）。状態はモード間で保持
    document.getElementById('review-toggle').classList.add('visible');
    if(newMode==='cam'){
        await landmarker.setOptions({runningMode:'VIDEO'});
        camVideo.classList.add('show');
        await startCamera(facing);camLoop();
    }else if(newMode==='photo'){
        await landmarker.setOptions({runningMode:'IMAGE'});
        bgCanvas.classList.add('show');
        if(photoImg) analyzePhoto(); else showUpload();
    }else{
        await landmarker.setOptions({runningMode:'VIDEO'});
        if(fileVideo.src){
            fileVideo.classList.add('show');
            document.getElementById('seek-wrap').classList.add('show');
            document.getElementById('frame-ctrl').classList.add('show');
            vidLoop();
        }else showUpload();
    }
}

function showUpload(){
    const fi=document.getElementById('file-input');
    if(mode==='photo'){
        document.getElementById('upload-icon').textContent='🖼';
        document.getElementById('upload-hint').textContent='弓道の写真を選んでください';
        fi.accept='image/*';

        document.getElementById('upload-icon').textContent='🎬';
        document.getElementById('upload-hint').textContent='弓道の動画を選んでください';

}

document.getElementById('btn-slow').addEventListener('click',()=>{
    slowMode=!slowMode;fileVideo.playbackRate=slowMode?.5:1;
    document.getElementById('btn-slow').textContent=slowMode?'🐢 0.5x ✓':'🐢 0.5x';
});

// コマ戻し・コマ送り
document.getElementById('btn-frame-back').addEventListener('click',()=>{
    if(!fileVideo.src) return;
    fileVideo.pause();
    document.getElementById('btn-play').textContent='▶ 再生';
    fileVideo.currentTime=Math.max(0, fileVideo.currentTime-frameStep);
});
document.getElementById('btn-frame-fwd').addEventListener('click',()=>{
    if(!fileVideo.src) return;
    fileVideo.pause();
    document.getElementById('btn-play').textContent='▶ 再生';
    fileVideo.currentTime=Math.min(fileVideo.duration||0, fileVideo.currentTime+frameStep);
});

// コマ幅切替
document.querySelectorAll('.step-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
        document.querySelectorAll('.step-btn').forEach(b=>b.classList.remove('on'));
        btn.classList.add('on');
        frameStep=parseFloat(btn.dataset.step);
    });
});

seekbar.addEventListener('input',()=>{
    if(fileVideo.duration) fileVideo.currentTime=(seekbar.value/100)*fileVideo.duration;
});

// ── カメラコントロール ──────────────────────────────────────
document.getElementById('btn-flip').addEventListener('click',()=>{
    flipped=!flipped;const tf=flipped?'scaleX(-1)':'none';
    camVideo.style.transform=overlay.style.transform=tf;
});
document.getElementById('btn-switch').addEventListener('click',async()=>{
    cancelAnimationFrame(camRafId);
    facing=facing==='environment'?'user':'environment';
    await startCamera(facing).catch(e=>alert(e.message));camLoop();
});

// ── 録画ボタン ──────────────────────────────────────────────
document.getElementById('btn-rec').addEventListener('click',()=>{
    if(!mediaRecorder||mediaRecorder.state==='inactive') startRec();
    else stopRec();
});

// ── タブ ────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>switchMode(t.dataset.mode)));

// ── ユーティリティ ──────────────────────────────────────────
const fmt=s=>`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;

// ── 初期化 ──────────────────────────────────────────────────
async function init(){
    try{
        const vision=await FilesetResolver.forVisionTasks(
            'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');
        landmarker=await PoseLandmarker.createFromOptions(vision,{
            baseOptions:{
                modelAssetPath:'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task',
                delegate:'GPU'
            },
            runningMode:'VIDEO',numPoses:1,
            minPoseDetectionConfidence:0.5,minTrackingConfidence:0.5
        });
        loadMsg.innerHTML='<b>カメラ起動中…</b>';
        camVideo.classList.add('show');
        await startCamera(facing);
        initPhaseStrip();
        document.getElementById('review-toggle').classList.add('visible');
        document.getElementById('loading').style.display='none';
        camLoop();
    }catch(e){
        document.querySelector('.spin').style.display='none';
        loadMsg.innerHTML=`<b style="color:#ff5252">⚠ エラー</b><br>${e.message}<br><small>HTTPS・カメラ許可が必要です</small>`;
    }
}
init();
</script>
